# Alembic Configuration File
# Dom'Atic — async PostgreSQL migrations

[alembic]
# Path to migration scripts (relative to this file)
script_location = .

# Template for migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for generated migration timestamps
timezone = UTC

# Max length of migration message slug
truncate_slug_length = 40

# sys.path modification — add backend root so app modules are importable
prepend_sys_path = ..

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
