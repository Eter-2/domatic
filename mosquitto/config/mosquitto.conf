# =============================================================================
# Mosquitto MQTT Broker — Dom'Atic configuration
# =============================================================================

# ---------------------------------------------------------------------------
# Listeners
# ---------------------------------------------------------------------------
listener 1883
listener 9001
protocol websockets

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# ---------------------------------------------------------------------------
# Persistence
# ---------------------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
log_dest file /mosquitto/log/mosquitto.log
log_type all

# ---------------------------------------------------------------------------
# Connection limits
# ---------------------------------------------------------------------------
max_connections 100
max_inflight_messages 20
