  # =========================================================================
  # MQTT
  # =========================================================================
  /mqtt/messages:
    get:
      tags: [MQTT]
      summary: Browse recent MQTT messages (last 10k retained)
      parameters:
        - in: query
          name: topic
          schema: { type: string }
          description: 'Topic filter (exact match or prefix with wildcard # e.g. "stat/#")'
        - in: query
          name: device_id
          schema: { type: string, format: uuid }
        - in: query
          name: retained
          schema: { type: boolean }
        - in: query
          name: limit
          schema: { type: integer, default: 100, maximum: 500 }
        - in: query
          name: before_id
          schema: { type: integer }
          description: Cursor for pagination (return records with id < before_id)
      responses:
        '200':
          description: MQTT message list (newest first)
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/MqttMessage' }
                  has_more: { type: boolean }

  /mqtt/publish:
    post:
      tags: [MQTT]
      summary: Publish a message to the MQTT broker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MqttPublishRequest'
      responses:
        '200':
          description: Message published
          content:
            application/json:
              schema:
                type: object
                properties:
                  published: { type: boolean }
                  topic:     { type: string }
                  payload:   { type: string }
        '503':
          description: MQTT broker not connected

