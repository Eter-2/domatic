  # =========================================================================
  # WEBSOCKET
  # =========================================================================
  /ws:
    get:
      tags: [WebSocket]
      summary: Real-time WebSocket event stream
      description: |
        Upgrade to WebSocket. Authenticate via `?token=<access_jwt>` query parameter.

        **Subscribed event types emitted by server:**

        | type | trigger | payload fields |
        |---|---|---|
        | `device_state` | MQTT state message received | device_id, device_name, state, mqtt_topic |
        | `device_online` | Device LWT = online | device_id, device_name, ip_address |
        | `device_offline` | Device LWT = offline | device_id, device_name, last_seen |
        | `mqtt_message` | Any MQTT message | id, topic, payload, qos, retained, device_id |
        | `security_alert` | New security event created | event_id, device_id, severity, event_type, description |
        | `automation_fired` | Automation rule triggered | automation_id, automation_name, trigger, actions_run |
        | `ping` | Server keepalive (every 30s) | server_time |

        **Client → Server messages:**

        | type | description |
        |---|---|
        | `subscribe_device` | Filter events to specific device_id |
        | `subscribe_room` | Filter events to devices in room_id |
        | `unsubscribe_all` | Reset to receive all events |
        | `pong` | Respond to server ping |

        **Connection lifecycle:**
        - Server sends `ping` every 30 seconds; client must respond with `pong` within 10s or connection is closed.
        - Clients auto-reconnect with exponential backoff (base 1s, max 30s).
        - On reconnect, client should call GET /devices and GET /security/stats to resync state.
      parameters:
        - in: query
          name: token
          required: true
          schema: { type: string }
          description: Valid access JWT
      responses:
        '101':
          description: WebSocket upgrade successful
        '401':
          description: Missing or invalid token
        '403':
          description: Token expired
